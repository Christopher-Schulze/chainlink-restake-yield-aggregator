# docker-compose.yml — local observability stack for the Restake Yield EA.
#
# Brings up:
#   - restake-ea:     the Go external adapter (port 8080)
#   - prometheus:     scrapes EA /metrics (port 9090)
#   - grafana:        visualises EA metrics (port 3000, admin/admin)
#
# Usage:
#   docker compose up -d
#   open http://localhost:3000  (admin / admin)
#   open http://localhost:9090  (Prometheus UI)
#
# The Grafana dashboard is auto-provisioned from deploy/grafana/dashboard.json.
version: "3.9"

services:
  restake-ea:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - LOG_LEVEL=info
      - AGGREGATION_MODE=weighted
      - ENABLE_VALIDATION=true
      - ENABLE_CIRCUIT_BREAKER=true
      - MAX_STALE_SECONDS=300
      - METRICS=true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=168h"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboard.json:/var/lib/grafana/dashboards/restake-yield-ea.json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
