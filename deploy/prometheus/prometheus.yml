global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "restake-yield-ea"
    metrics_path: /metrics
    static_configs:
      - targets: ["restake-ea:8080"]
        labels:
          service: "restake-yield-ea"
          env: "local"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
