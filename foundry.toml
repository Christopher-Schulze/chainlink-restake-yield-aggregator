[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
out = "out"
libs = ["lib"]
solc = "0.8.24"

# Allow the test to read the signature fixture generated by the Go adapter.
fs_permissions = [{ access = "read", path = "./contracts/test/fixtures" }]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[fmt]
line_length = 100
bracket_spacing = true
int_types = "long"
